# iris-irix53.toml — IRIX 5.3 for Indy install run.
# Follows docs/irix-install.md.
# PROM is loaded from the embedded image (prom.bin not required).

scale       = 2
headless    = false
no_audio    = false
banks       = [128, 128, 0, 0]
# Per-config NVRAM so the 5.3 and 6.5 PROM env don't collide.
nvram       = "nvram-irix53.bin"
serial_log  = "irix-install-console.log"

# Empty 4 GB uncompressed CHD created with (always CHD, never raw):
#   chdman createhd -o irix53.chd -s 4294967296 -ss 512 -c none
[scsi.1]
path  = "irix53.chd"
cdrom = false

# Scratch volume for host<->guest file injection without networking.
[scsi.2]
path    = "scratch.raw"
cdrom   = false
overlay = false
scratch = true
size_mb = 16

# 5.3 base CD active; Developer's Toolbox 6.0 discs in the changer so
# they can be cycled in with `iris-ci cdrom-eject 4` for the post-base
# add-on install (docs/irix-install.md §11). Omit the discs = [...]
# list if you don't have the Toolbox CDs.
[scsi.4]
path  = "irix53/IRIX 5.3 for Indy including R5000.iso"
cdrom = true
discs = [
  "irix53/IRIX 5.3 for Indy including R5000.iso",
  "irix53/Developers Toolbox 6.0 Disc 1.iso",
  "irix53/Developers Toolbox 6.0 Disc 2.iso",
  "irix53/Developers Toolbox 6.0 Disc 3.iso",
]

[vino]
source = "camera"

[[port_forward]]
proto      = "tcp"
host_port  = 2323
guest_port = 23
bind       = "localhost"
