# iris-irix53.toml — IRIX 5.3 for Indy install run.
# Follows docs/irix-install.md.
# PROM is loaded from the embedded image (prom.bin not required).

headless    = false
no_audio    = false
banks       = [128, 128, 0, 0]
# Per-config NVRAM so the 5.3 and 6.5 PROM env don't collide.
nvram       = "nvram-irix53.bin"
serial_log  = "irix-install-console.log"

# Empty 4 GB sparse raw disk created with:
#   truncate -s 4G irix53.raw
[scsi.1]
path  = "irix53.raw"
cdrom = false

# Scratch volume for host<->guest file injection without networking.
[scsi.2]
path    = "scratch.raw"
cdrom   = false
overlay = false
scratch = true
size_mb = 16

# Single install CD at SCSI 4 — no changer (5.3 ships on one disc).
[scsi.4]
path  = "irix53/IRIX 5.3 for Indy.iso"
cdrom = true

[vino]
source = "camera"

[[port_forward]]
proto      = "tcp"
host_port  = 2323
guest_port = 23
bind       = "localhost"
