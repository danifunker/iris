# Nightly sync from techomancer/iris main → danifunker/iris main.
#
# IMPORTANT: This file must live on the default branch (main) for the schedule
# trigger to fire. The release workflow (release.yml) lives on the build branch.
#
# Repo variable required:
#   BUILD_BRANCH  — branch to trigger the release on (default: build-pipeline-danifunker)

name: Sync Upstream

on:
  schedule:
    # 10:30 UTC = 06:30 EDT. GitHub cron is always UTC and ignores DST, so
    # during EST (winter) this fires at 05:30 local.
    - cron: '30 10 * * *'
  workflow_dispatch:
    inputs:
      build_branch:
        description: Build branch to trigger after sync (overrides BUILD_BRANCH variable)
        required: false
        default: ''
      skip_release:
        description: Sync only — do not trigger a release
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  sync:
    name: Sync from techomancer/iris
    runs-on: ubuntu-latest
    outputs:
      had_changes: ${{ steps.rebase.outputs.had_changes }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/techomancer/iris.git || true
          git fetch upstream main

      - name: Rebase onto upstream/main
        id: rebase
        run: |
          BEFORE=$(git rev-parse HEAD)
          git rebase upstream/main
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "had_changes=true" >> $GITHUB_OUTPUT
          else
            echo "had_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Vendor fork-only build files onto main
        run: |
          BUILD_BRANCH="${{ vars.BUILD_BRANCH || 'build-pipeline-danifunker' }}"
          git fetch origin "$BUILD_BRANCH"
          # The Release workflow runs on main and reads some files that are not
          # upstream (e.g. LICENSE-GPL3.txt, installer/iris-gui-notarized.entitlements),
          # so the upstream mirror cannot supply them. Re-stock main with exactly
          # those: everything the build branch has that upstream/main lacks, minus
          # the fork-management paths that are intentionally build-branch-only.
          # This is self-adjusting — a new fork-only build input is picked up
          # automatically; a file that lands upstream drops out (the mirror then
          # provides it). To keep a fork-only file OFF main, add it to the grep -vE.
          mapfile -t FILES < <(
            comm -23 \
              <(git ls-tree -r "origin/$BUILD_BRANCH" --name-only | sort) \
              <(git ls-tree -r upstream/main          --name-only | sort) \
            | grep -vE '^(\.github/|backup/|docs/|CLAUDE\.md$)'
          )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No fork-only build files to vendor."
          else
            printf 'Vendoring onto main:\n'; printf '  %s\n' "${FILES[@]}"
            git checkout "origin/$BUILD_BRANCH" -- "${FILES[@]}"
            if git diff --cached --quiet; then
              echo "Vendored files already current on main."
            else
              git commit \
                -m "main: vendor fork-only build files for release packaging" \
                -m "Auto-maintained by sync-upstream.yml: files release.yml reads (it runs on main) that are not upstream, so the nightly mirror does not carry them. Re-synced from ${BUILD_BRANCH} every night."
            fi
          fi

      - name: Push updated main
        run: git push origin main --force-with-lease

      - name: Rebase build branch onto updated main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # notify TITLE BODY — open a deduped GitHub issue, but fall back to a
          # run annotation + job summary if Issues are disabled on the repo, so
          # a missing issues feature never hard-fails the workflow.
          notify() {
            title="$1"; body="$2"
            existing=$(gh issue list --state open --search "$title" --json number --jq length 2>/dev/null) || existing=""
            if [ "$existing" = "0" ]; then
              gh issue create --title "$title" --body "$body" 2>/dev/null && return 0
            elif [ -n "$existing" ]; then
              return 0
            fi
            echo "::warning title=${title}::${body}"
            { printf '### %s\n\n%s\n' "$title" "$body"; } >> "$GITHUB_STEP_SUMMARY"
          }

          BUILD_BRANCH="${{ vars.BUILD_BRANCH || 'build-pipeline-danifunker' }}"
          git fetch origin "$BUILD_BRANCH"
          git checkout "$BUILD_BRANCH"
          BUILD_TIP=$(git rev-parse HEAD)   # the build branch as we want it to look after the rebase

          # main = the upstream mirror + every fork-only file it carries as a
          # duplicate of the build branch: the workflow files (Actions can only
          # schedule them from the default branch) plus the vendored build inputs
          # (installer/*.entitlements, LICENSE-GPL3.txt — see the vendor step).
          # Replaying the build branch's own commits that touch any of those onto
          # a main that already has them is an unavoidable add/add conflict.
          #
          # The build branch is canonical for ALL fork-only paths, and a rebase
          # onto new upstream must leave those files exactly as they are on the
          # branch tip. So resolve a conflict on any file upstream/main does NOT
          # track by taking the branch-TIP version (not --theirs, which is the
          # individual commit being replayed — that can resurrect a superseded
          # version when a later fix commit is cherry-pick-skipped as already on
          # main, e.g. the invalid-XML entitlements bug). Escalate only a conflict
          # on a file upstream also tracks: that is a genuine upstream divergence.
          # Self-adjusting — it matches whatever the vendor step put on main, so a
          # newly-vendored build input never reintroduces this break.
          take_tip() {   # resolve $1 to the build-branch tip (added or removed there)
            if git cat-file -e "$BUILD_TIP:$1" 2>/dev/null; then
              git checkout "$BUILD_TIP" -- "$1" && git add -- "$1"
            else
              git rm -f -- "$1"
            fi
          }
          set +e
          git rebase main
          rc=$?
          while [ $rc -ne 0 ] && { [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; }; do
            escalate=
            for f in $(git diff --name-only --diff-filter=U); do
              case "$f" in
                .github/workflows/*) take_tip "$f" ;;
                *)
                  if git cat-file -e "upstream/main:$f" 2>/dev/null; then
                    escalate=1
                  else
                    take_tip "$f"
                  fi ;;
              esac
            done
            if [ -n "$escalate" ]; then
              git rebase --abort
              rc=1
              break
            fi
            GIT_EDITOR=true git rebase --continue
            rc=$?
          done
          set -e

          if [ $rc -eq 0 ]; then
            git push origin "$BUILD_BRANCH" --force-with-lease
            echo "Rebased $BUILD_BRANCH onto main."
          else
            echo "::error::Auto-rebase of ${BUILD_BRANCH} onto main failed on an upstream-tracked file (genuine divergence)."
            notify "Auto-rebase of ${BUILD_BRANCH} onto main failed" \
              "The nightly sync rebased main but could not automatically rebase ${BUILD_BRANCH} onto it. Resolve manually: git switch ${BUILD_BRANCH} && git rebase main && git push --force-with-lease"
            exit 1
          fi

      - name: Check for new feature flags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # All known feature flags. When a new flag appears that isn't here,
          # an issue is filed. After deciding what to do with it, add it to
          # this list to suppress future issues.
          KNOWN="chd lightning tlbvmap jit rex-jit camera idle-pause r5k r5ksc r5ksc_triton debug_cache developer developer_ip7 developerx ci_clock tlbstats"

          notify() {
            title="$1"; body="$2"
            existing=$(gh issue list --state open --search "$title" --json number --jq length 2>/dev/null) || existing=""
            if [ "$existing" = "0" ]; then
              gh issue create --title "$title" --body "$body" 2>/dev/null && return 0
            elif [ -n "$existing" ]; then
              return 0
            fi
            echo "::warning title=${title}::${body}"
            { printf '### %s\n\n%s\n' "$title" "$body"; } >> "$GITHUB_STEP_SUMMARY"
          }

          while IFS= read -r feature; do
            [ "$feature" = "default" ] && continue
            if ! printf ' %s ' "$KNOWN" | grep -qF " ${feature} "; then
              notify "New upstream feature flag: \`${feature}\`" \
                "Upstream added a new \`[features]\` entry \`${feature}\` in \`Cargo.toml\`. Review whether to include it in \`.github/workflows/release.yml\`, then add it to the \`KNOWN\` list in \`.github/workflows/sync-upstream.yml\`."
            fi
          done < <(awk '/^\[features\]/{f=1;next} /^\[[a-zA-Z]/{f=0} f && /^[a-zA-Z_-]+ *= *\[/{print $1}' Cargo.toml)

  trigger-release:
    name: Trigger Release
    needs: sync
    if: needs.sync.outputs.had_changes == 'true' && github.event.inputs.skip_release != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger release workflow on build branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_BRANCH="${{ github.event.inputs.build_branch || vars.BUILD_BRANCH || 'build-pipeline-danifunker' }}"
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --ref "$BUILD_BRANCH"
